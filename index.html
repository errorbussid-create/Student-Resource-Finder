<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduStream // Academic Resource Router</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #09090b;
            --bg-card: #141417;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --border-color: #27272a;
            --border-hover: #3f3f46;
            --radius: 12px;
            --shadow-glow: 0 0 20px rgba(59, 130, 246, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            letter-spacing: -0.01em;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        header {
            margin-bottom: 48px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            margin-bottom: 12px;
            background: linear-gradient(to bottom right, #ffffff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-wrapper {
            background: var(--bg-card);
            padding: 6px;
            border-radius: var(--radius);
            display: flex;
            gap: 8px;
            margin-bottom: 48px;
            border: 1px solid var(--border-color);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: var(--shadow-glow);
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            padding: 14px 18px;
            font-size: 1rem;
            font-family: inherit;
            color: var(--text-main);
            background: transparent;
        }

        .search-input::placeholder {
            color: #52525b;
        }

        .search-btn {
            background-color: var(--text-main);
            color: var(--bg-primary);
            border: none;
            padding: 0 28px;
            border-radius: calc(var(--radius) - 4px);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .search-btn:hover {
            background-color: #ffffff;
            transform: translateY(-1px);
        }

        .loader {
            display: none;
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95rem;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            margin: 0 auto 16px auto;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
            gap: 32px;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        @media (max-width: 980px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            padding: 32px;
        }

        .panel-header {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-header span {
            font-size: 0.75rem;
            background: #1e3a8a;
            color: #93c5fd;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .resource-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.2s ease;
        }

        .card-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--border-hover);
            transform: translateX(4px);
        }

        .card-title-link {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.15s ease;
        }

        .card-title-link:hover {
            color: var(--accent-hover);
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .meta-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent-hover);
            font-weight: 600;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Academic Knowledge Router</h1>
            <p>Unified ingestion engine for targeted open-access curricula and problem sets</p>
        </header>

        <div class="search-wrapper">
            <input type="text" id="queryInput" class="search-input" placeholder="Enter academic subject or topic (e.g., Java Multi-threading, QuickSort)..." onkeypress="if(event.key === 'Enter') executeQuery()">
            <button class="search-btn" onclick="executeQuery()">Analyze & Fetch</button>
        </div>

        <div id="loaderState" class="loader">
            <div class="spinner"></div>
            <span>Processing structural request and aggregating links...</span>
        </div>

        <main class="dashboard-grid" id="dashboardView">
            <section class="panel">
                <h2 class="panel-header">Structured Curricula <span>Top 5 Sources</span></h2>
                <ul class="resource-list" id="curriculumOutput">
                    </ul>
            </section>
            
            <section class="panel">
                <h2 class="panel-header">Practical Implementations <span>Code Labs</span></h2>
                <ul class="resource-list" id="challengesOutput">
                    </ul>
            </section>
        </main>
    </div>

    <script>
        // CRITICAL SECURITY NOTE: Place your brand-new, secure API key here.
        // Never push this file to GitHub or share it with anyone with your key exposed.
        const GEMINI_API_KEY = "AQ.Ab8RN6IRBa9ZhRkBGklkaUZr_2qgl-eC-pnLRQ11oFHShSes0w"; 

        async function executeQuery() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) return;

            // Simple alert fallback if the user forgets to provision a key
            if (GEMINI_API_KEY === "YOUR_NEW_GEMINI_API_KEY_HERE") {
                alert("Configuration Required: Please insert your new Gemini API key into the script block.");
                return;
            }

            const loaderState = document.getElementById('loaderState');
            const dashboardView = document.getElementById('dashboardView');
            const curriculumOutput = document.getElementById('curriculumOutput');
            const challengesOutput = document.getElementById('challengesOutput');

            // Reset dashboard state
            loaderState.style.display = 'block';
            dashboardView.style.opacity = '0.1';
            curriculumOutput.innerHTML = '';
            challengesOutput.innerHTML = '';

            const architecturePrompt = `You are an elite academic engine. Curate structured links for the topic: "${query}". 
            Provide exactly 5 foundational tutorial/course URLs and 5 industry-relevant coding problem URLs.
            You must return raw, valid JSON only. No formatting strings, no backticks, no markdown blocks. 
            
            Format Template:
            {
                "curriculum": [{"title": "Course Title", "url": "https://link.com", "snippet": "Targeted takeaway summary."}],
                "challenges": [{"title": "Problem Title", "url": "https://link.com", "provider": "LeetCode/HackerRank/GitHub"}]
            }`;

            try {
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: architecturePrompt }] }]
                    })
                });

                if (!response.ok) throw new Error('Network lifecycle failure.');

                const rawData = await response.json();
                let cleanText = rawData.candidates[0].content.parts[0].text;
                
                cleanText = cleanText.replace(/```json|```/g, "").trim(); 
                
                const dataset = JSON.parse(cleanText);

                // Populate Curricula Panels
                dataset.curriculum.forEach(item => {
                    curriculumOutput.innerHTML += `
                        <li class="card-item">
                            <a href="${item.url}" target="_blank" class="card-title-link">${item.title} ↗</a>
                            <p class="card-desc">${item.snippet}</p>
                        </li>`;
                });

                // Populate Technical Challenges Panels
                dataset.challenges.forEach(item => {
                    challengesOutput.innerHTML += `
                        <li class="card-item">
                            <a href="${item.url}" target="_blank" class="card-title-link">${item.title} ↗</a>
                            <span class="meta-tag">Platform: ${item.provider}</span>
                        </li>`;
                });

            } catch (err) {
                console.error("Pipeline breakdown: ", err);
                alert("An error occurred executing your request. Check the browser console.");
            } finally {
                loaderState.style.display = 'none';
                dashboardView.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
