<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduStream // Academic Resource Router</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #09090b;
            --bg-card: #141417;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --border-color: #27272a;
            --border-hover: #3f3f46;
            --radius: 12px;
            --shadow-glow: 0 0 20px rgba(59, 130, 246, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            letter-spacing: -0.01em;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        header {
            margin-bottom: 48px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            margin-bottom: 12px;
            background: linear-gradient(to bottom right, #ffffff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-wrapper {
            background: var(--bg-card);
            padding: 6px;
            border-radius: var(--radius);
            display: flex;
            gap: 8px;
            margin-bottom: 48px;
            border: 1px solid var(--border-color);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: var(--shadow-glow);
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            padding: 14px 18px;
            font-size: 1rem;
            font-family: inherit;
            color: var(--text-main);
            background: transparent;
        }

        .search-input::placeholder {
            color: #52525b;
        }

        .search-btn {
            background-color: var(--text-main);
            color: var(--bg-primary);
            border: none;
            padding: 0 28px;
            border-radius: calc(var(--radius) - 4px);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .search-btn:hover {
            background-color: #ffffff;
            transform: translateY(-1px);
        }

        .loader {
            display: none;
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95rem;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            margin: 0 auto 16px auto;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
            gap: 32px;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        @media (max-width: 980px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            padding: 32px;
        }

        .panel-header {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-header span {
            font-size: 0.75rem;
            background: #1e3a8a;
            color: #93c5fd;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .resource-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.2s ease;
        }

        .card-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--border-hover);
            transform: translateX(4px);
        }

        .card-title-link {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.15s ease;
        }

        .card-title-link:hover {
            color: var(--accent-hover);
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .meta-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent-hover);
            font-weight: 600;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Academic Knowledge Router</h1>
            <p>Keyless routing engine for open-access software engineering curricula</p>
        </header>

        <div class="search-wrapper">
            <input type="text" id="queryInput" class="search-input" placeholder="Search a topic (e.g., array, sorting, recursion, linked list)..." onkeypress="if(event.key === 'Enter') executeQuery()">
            <button class="search-btn" onclick="executeQuery()">Query Engine</button>
        </div>

        <div id="loaderState" class="loader">
            <div class="spinner"></div>
            <span>Querying open-access indices...</span>
        </div>

        <main class="dashboard-grid" id="dashboardView">
            <section class="panel">
                <h2 class="panel-header">Structured Curricula <span id="courseCount">0 Sources</span></h2>
                <ul class="resource-list" id="curriculumOutput"></ul>
            </section>
            
            <section class="panel">
                <h2 class="panel-header">Practical Implementations <span id="challengeCount">0 Labs</span></h2>
                <ul class="resource-list" id="challengesOutput"></ul>
            </section>
        </main>
    </div>

    <script>
        // Fixed Local Search Database Matrix
        const ACADEMIC_DATABASE = {
            "array": {
                "curriculum": [
                    { "title": "Stanford CS106A: Array Mechanics", "url": "https://see.stanford.edu/Course/CS106A", "snippet": "Foundational memory allocation, contiguous block tracking, and time complexity analyses." },
                    { "title": "MIT OpenCourseWare: Static Array Structures", "url": "https://ocw.mit.edu/", "snippet": "Algorithmic properties of deterministic sequences and reference indexing." },
                    { "title": "GeeksforGeeks: Array Data Structure Hub", "url": "https://www.geeksforgeeks.org/array-data-structure/", "snippet": "Comprehensive reference manuals for single and multi-dimensional tracking variants." },
                    { "title": "freeCodeCamp: Comprehensive Arrays Masterclass", "url": "https://www.freecodecamp.org/", "snippet": "Practical traversal operations, insertions, updates, and space configuration dynamics." },
                    { "title": "W3Schools: Structured Array Reference Maps", "url": "https://www.w3schools.com/", "snippet": "Language-agnostic syntax structures for processing contiguous data boundaries." }
                ],
                "challenges": [
                    { "title": "Two Sum (Problem 1)", "url": "https://leetcode.com/problems/two-sum/", "provider": "LeetCode" },
                    { "title": "Container With Most Water (Problem 11)", "url": "https://leetcode.com/problems/container-with-most-water/", "provider": "LeetCode" },
                    { "title": "Array Manipulation Labs", "url": "https://www.hackerrank.com/domains/data-structures?filters%5Bsubdomains%5D%5B%5D=arrays", "provider": "HackerRank" },
                    { "title": "Maximum Subarray Matrix", "url": "https://leetcode.com/problems/maximum-subarray/", "provider": "LeetCode" },
                    { "title": "Missing Number Sequences", "url": "https://leetcode.com/problems/missing-number/", "provider": "LeetCode" }
                ]
            },
            "sorting": {
                "curriculum": [
                    { "title": "MIT Introduction to Algorithms: Sorting", "url": "https://ocw.mit.edu/", "snippet": "Mathematical proofs for comparison algorithms and lower boundary constraints." },
                    { "title": "Stanford CS106B: QuickSort & MergeSort", "url": "https://see.stanford.edu/", "snippet": "Divide-and-conquer processing paradigms, recursion stacks, and runtime analyses." },
                    { "title": "GeeksforGeeks: Analysis of Sorting Systems", "url": "https://www.geeksforgeeks.org/sorting-algorithms/", "snippet": "Stability factors, optimization properties, and modular runtime metrics." },
                    { "title": "freeCodeCamp: Complete Sorting Algorithm Visualizer", "url": "https://www.freecodecamp.org/", "snippet": "Step-by-step graphical tracing of bubble, insertion, radix, and merge structures." },
                    { "title": "Harvard CS50: Classical Sorting Structures", "url": "https://cs50.harvard.edu/", "snippet": "Intuitive architectural foundations of resource distribution, comparisons, and swaps." }
                ],
                "challenges": [
                    { "title": "Merge Sorted Array (Problem 88)", "url": "https://leetcode.com/problems/merge-sorted-array/", "provider": "LeetCode" },
                    { "title": "Sort an Array - Optimal Pipeline", "url": "https://leetcode.com/problems/sort-an-array/", "provider": "LeetCode" },
                    { "title": "Kth Largest Element Discovery", "url": "https://leetcode.com/problems/kth-largest-element-in-an-array/", "provider": "LeetCode" },
                    { "title": "Sorting Implementation Challenges", "url": "https://www.hackerrank.com/", "provider": "HackerRank" },
                    { "title": "Intersection of Two Arrays", "url": "https://leetcode.com/problems/intersection-of-two-arrays/", "provider": "LeetCode" }
                ]
            }
        };

        // Generates targeted fallback URLs if the subject isn't indexed locally
        function generateDynamicFallback(rawQuery) {
            const query = encodeURIComponent(rawQuery);
            return {
                "curriculum": [
                    { "title": `Google Scholar Reference Manual: ${rawQuery}`, "url": `https://scholar.google.com/scholar?q=${query}`, "snippet": "Peer-reviewed theoretical frameworks, computing papers, and algorithmic analysis." },
                    { "title": `GeeksforGeeks Document Hub: ${rawQuery}`, "url": `https://www.geeksforgeeks.org/search/?q=${query}`, "snippet": "Language-specific implementation code blocks, data tracking explanations, and execution metrics." },
                    { "title": `freeCodeCamp Modules: ${rawQuery}`, "url": `https://www.freecodecamp.org/news/search/?query=${query}`, "snippet": "Open-access learning tracks, step-by-step code blueprints, and practical challenge environments." },
                    { "title": `YouTube Lectures: ${rawQuery}`, "url": `https://www.youtube.com/results?search_query=${query}+programming+course`, "snippet": "Video walk-throughs, continuous coding exercises, and whiteboard layout logic." },
                    { "title": "MIT OpenCourseWare Computational Archive", "url": "https://ocw.mit.edu/", "snippet": "Official engineering curricula lecture packages, program files, and course documentation." }
                ],
                "challenges": [
                    { "title": `LeetCode Problem Matrices: ${rawQuery}`, "url": `https://leetcode.com/problemset/all/?search=${query}`, "provider": "LeetCode" },
                    { "title": `HackerRank Lab Index: ${rawQuery}`, "url": `https://www.hackerrank.com/domains/tutorials/10-days-of-javascript`, "provider": "HackerRank" },
                    { "title": `CodeChef Live Arena: ${rawQuery}`, "url": `https://www.codechef.com/`, "provider": "CodeChef" },
                    { "title": "GitHub Open Repositories", "url": "https://github.com/", "provider": "GitHub" },
                    { "title": "Codeforces Competition Environment", "url": "https://codeforces.com/", "provider": "Codeforces" }
                ]
            };
        }

        function executeQuery() {
            const queryInput = document.getElementById('queryInput');
            if (!queryInput) return;

            const rawInput = queryInput.value.trim();
            if (!rawInput) return;

            const normalizedQuery = rawInput.toLowerCase();
            const loaderState = document.getElementById('loaderState');
            const dashboardView = document.getElementById('dashboardView');
            const curriculumOutput = document.getElementById('curriculumOutput');
            const challengesOutput = document.getElementById('challengesOutput');

            // Set loading state configurations
            loaderState.style.display = 'block';
            dashboardView.style.opacity = '0.1';
            curriculumOutput.innerHTML = '';
            challengesOutput.innerHTML = '';

            setTimeout(() => {
                let dataset = ACADEMIC_DATABASE[normalizedQuery];
                
                if (!dataset) {
                    if (normalizedQuery.includes("array")) dataset = ACADEMIC_DATABASE["array"];
                    else if (normalizedQuery.includes("sort")) dataset = ACADEMIC_DATABASE["sorting"];
                    else dataset = generateDynamicFallback(rawInput);
                }

                // Inject Curricula Panels
                dataset.curriculum.forEach(item => {
                    curriculumOutput.innerHTML += `
                        <li class="card-item">
                            <a href="${item.url}" target="_blank" class="card-title-link">${item.title} ↗</a>
                            <p class="card-desc">${item.snippet}</p>
                        </li>`;
                });

                // Inject Challenges Panels
                dataset.challenges.forEach(item => {
                    challengesOutput.innerHTML += `
                        <li class="card-item">
                            <a href="${item.url}" target="_blank" class="card-title-link">${item.title} ↗</a>
                            <span class="meta-tag">Platform: ${item.provider}</span>
                        </li>`;
                });

                document.getElementById('courseCount').innerText = `${dataset.curriculum.length} Sources`;
                document.getElementById('challengeCount').innerText = `${dataset.challenges.length} Labs`;

                loaderState.style.display = 'none';
                dashboardView.style.opacity = '1';
            }, 200);
        }
    </script>
</body>
</html>
